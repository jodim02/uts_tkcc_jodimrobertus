<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Activity Tracker</title>

    <style>
    body {
        font-family: Arial;
        margin: 0;
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f4f4f4;
    }

    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);

        width: 90%;
        max-width: 400px;
    }

    .form-group {
        margin-bottom: 10px;
    }

    label {
        width: 100%;
        margin-bottom: 5px;
    }

    input {
        padding: 8px;
        width: 100%;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 10px;
    }

    li {
        margin-top: 5px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    @media (max-width: 480px) {
        .container {
            padding: 15px;
        }

        h2 {
            font-size: 20px;
        }
    }
</style>

</head>
<body>

<div class="container">
    <h2>Daily Activity Tracker</h2>

    <div class="form-group">
        <label for="activity">Aktivitas:</label>
        <input type="text" id="activity" placeholder="Nama aktivitas">
    </div>

    <div class="form-group">
        <label for="duration">Durasi (menit):</label>
        <input type="number" id="duration" placeholder="Durasi">
    </div>

    <button id="btnTambah">Tambah</button>

    <h3 id="total">Total: 0 Menit (0 Aktivitas)</h3>

    <ul id="list"></ul>
</div>

<script src="js/script.js"></script>
</body>
</html>
